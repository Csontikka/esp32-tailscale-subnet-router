version: 2
updates:
  # GitHub Actions used by the workflows in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

# NOTE: the external/microlink git submodule is intentionally NOT tracked by
# Dependabot. Its pointer is hand-managed against feature-branch commits (the
# active line is derp-readwriter-split), NOT the branch declared in .gitmodules
# (esp32-router-integration). Dependabot's "reset the pointer to the tracked
# branch HEAD" model therefore REGRESSES the submodule — it once opened a PR to
# revert 37 commits of DERP/exit-node/throughput fixes for a stale README
# commit. Bump external/microlink by hand instead.
